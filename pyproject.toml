[tool.poetry]
name = "pybear-dask"
version = "0.2.4"
description = "Python modules for data analytics applications with dask"
license = "BSD-3-clause"
authors = ["Bill Sousa <WKSJR99@msn.com>"]
maintainers = ["Bill Sousa"]
readme = "README.rst"
homepage = "https://github.com/PylarBear/pybear-dask"
repository = "https://github.com/PylarBear/pybear-dask"
#documentation
keywords = ["python data analytics pybear dask"]
#classifiers
packages = [
	{ include = "pybear_dask", from = "src"}
]
include = [
    "LICENSE",
    "README.rst",
    "CHANGELOG.md",
    "tests"
]
#exclude


[tool.poetry.dependencies]
python = ">=3.10"
dask = [
    {version = "==2025.1", python = "==3.10"},   # can be 2025.1, if 2024.12.1 fails must be 2025.1 if passes try 2024.12.0
    {version = "==2025.1", python = "==3.11"},   # can be 2025.1, if 2024.12.1 fails must be 2025.1 if passes try 2024.12.0
    {version = "==2025.1", python = "==3.12"},   # can be 2025.1, if 2024.12.1 fails must be 2025.1 if passes try 2024.12.0
    {version = "==2025.1", python = "==3.13"},   # this must be 2025.1
    {version = "==2026.3", python = "==3.14"},
]
dask-ml = [
    {version = "==2025.1", python = "==3.10"},  # can be 2025.1, if 2024.4.4 passes try 2024.3.20, if fails, must be 2025.1
    {version = "==2025.1", python = "==3.11"},  # can be 2025.1, if 2024.4.4 passes try 2024.3.20, if fails, must be 2025.1
    {version = "==2025.1", python = "==3.12"},  # can be 2025.1, if 2024.4.4 passes try 2024.3.20, if fails, must be 2025.1
    {version = "==2025.1", python = "==3.13"},  # this must be 2025.1
    {version = "==2025.1", python = "==3.14"},
]
distributed = [
    {version = "==2025.1", python = "==3.10"},  # can be 2025.1, if 2024.12.1 fails must be 2025.1 if passes try 2024.12.0
    {version = "==2025.1", python = "==3.11"},  # can be 2025.1, if 2024.12.1 fails must be 2025.1 if passes try 2024.12.0
    {version = "==2025.1", python = "==3.12"},  # can be 2025.1, if 2024.12.1 fails must be 2025.1 if passes try 2024.12.0
    {version = "==2025.1", python = "==3.13"},	# this must be 2025.1
    {version = "==2026.3", python = "==3.14"},  # if this fails, maybe try a lower version
]
pyarrow = [
    {version = "==16.0.0", python = "==3.10"},  # can be 24.0.0, must at least be 14.0.1, if this fails, bump + 1
	{version = "==16.0.0", python = "==3.11"},  # can be 24.0.0, must at least be 14.0.1, if this fails, bump + 1
	{version = "==16.0.0", python = "==3.12"},  # can be 24.0.0, must at least be 14.0.1, if this fails, bump + 1
	{version = "==18.0.0", python = "==3.13"},  # can be 24.0.0, must at least be 14.0.1, if this fails, bump + 1
    {version = "==22.0.0", python = "==3.14"}  # can be 24.0.0, if this fails, bump + 1
]
#{ version = ">=0.1.22", source = "testpypi" }
pybear = [
    {version = "==0.2.2", python = "==3.10"},  # 0.2.3 works, if 0.2.2 fails, must be 0.2.3, if passes try 0.2.1
	{version = "==0.2.2", python = "==3.11"},  # 0.2.3 works, if 0.2.2 fails, must be 0.2.3, if passes try 0.2.1
	{version = "==0.2.2", python = "==3.12"},  # 0.2.3 works, if 0.2.2 fails, must be 0.2.3, if passes try 0.2.1
	{version = "==0.2.2", python = "==3.13"},  # 0.2.3 works, if 0.2.2 fails, must be 0.2.3, if passes try 0.2.1
    {version = "==0.2.2", python = "==3.14"} 
]
scikit-learn = [
    {version = ">=1.3.0,==1.6.1,<1.8", python = "==3.10"},    # can be 1.6.1, cannot be 1.7.0, if 1.6.0 passes try 1.5.2, if fails must be 1.6.1
	{version = ">=1.3.0,==1.6.1", python = "==3.11"},    # can be 1.6.1, cannot be 1.7.0, if 1.6.0 passes try 1.5.2, if fails must be 1.6.1
	{version = ">=1.3.1,==1.6.1", python = "==3.12"},    # can be 1.6.1, cannot be 1.7.0, if 1.6.0 passes try 1.5.2, if fails must be 1.6.1
	{version = ">=1.5.2,==1.7.0", python = "==3.13"},    # can be 1.6.1, 1.7.0. if 1.7.1 passes try 1.7.2, if fails must be 1.7.0.
	{version = ">=1.7.2", python = "==3.14"}
]

[tool.poetry.group.dev.dependencies]
bokeh = "*"
docutils = ">=0.20"
graphviz = "*"
jupyter = "*"
notebook = "*"


[tool.poetry.group.test.dependencies]
pytest = [
    {version = ">=7.0.0", python = "==3.10"},
	{version = ">=7.0.0", python = "==3.11"},
	{version = ">=7.0.0", python = "==3.12"},
	{version = ">=7.0.0", python = "==3.13"},
    {version = ">=8.0.0", python = "==3.14"}
]
pytest-cov = "*"
pytest-html = "*"


[tool.poetry.extras]
# Optional dependencies. They can be opted into by apps.


[tool.poetry.scripts]


[tool.poetry.plugins]


[tool.poetry.urls]
Homepage = "https://github.com/PylarBear/pybear"


#[[tool.poetry.source]]
#name = "testpypi"
#url = "https://test.pypi.org/simple/"
#priority = "explicit"


[tool.coverage.run]
source = ["pybear_dask"]


[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"


