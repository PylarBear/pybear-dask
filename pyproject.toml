[tool.poetry]
name = "pybear-dask"
version = "0.2.4"
description = "Python modules for data analytics applications with dask"
license = "BSD-3-clause"
authors = ["Bill Sousa <WKSJR99@msn.com>"]
maintainers = ["Bill Sousa"]
readme = "README.rst"
homepage = "https://github.com/PylarBear/pybear-dask"
repository = "https://github.com/PylarBear/pybear-dask"
#documentation
keywords = ["python data analytics pybear dask"]
#classifiers
packages = [
	{ include = "pybear_dask", from = "src"}
]
include = [
    "LICENSE",
    "README.rst",
    "CHANGELOG.md",
    "tests"
]
#exclude


[tool.poetry.dependencies]
python = ">=3.10"
dask = [
    {version = "==2025.1", python = "==3.10"},
    {version = "==2025.1", python = "==3.11"},
    {version = "==2025.1", python = "==3.12"},
    {version = "==2025.1", python = "==3.13"},
    {version = "==2025.1", python = "==3.14"},
]
dask-ml = [
    {version = "==2025.1", python = "==3.10"},
    {version = "==2025.1", python = "==3.11"},
    {version = "==2025.1", python = "==3.12"},
    {version = "==2025.1", python = "==3.13"},
    {version = "<2025.1", python = "==3.14"},
]
distributed = [
    {version = "==2025.1", python = "==3.10"},
    {version = "==2025.1", python = "==3.11"},
    {version = "==2025.1", python = "==3.12"},
    {version = "==2025.1", python = "==3.13"},
    {version = "==2025.1", python = "==3.14"},
]
pyarrow = [
    {version = ">=6.0.0", python = "==3.10"},
	{version = ">=10.0.1", python = "==3.11"},
	{version = ">=14.0.0", python = "==3.12"},
	{version = ">=18.0.0", python = "==3.13"},
    {version = ">=22.0.0", python = "==3.14"}
]
pybear = [
    {version = ">=0.2.0", python = "==3.10"},  #{ version = ">=0.1.22", source = "testpypi" }
	{version = ">=0.2.0", python = "==3.11"},  #{ version = ">=0.1.22", source = "testpypi" }
	{version = ">=0.2.0", python = "==3.12"},  #{ version = ">=0.1.22", source = "testpypi" }
	{version = ">=0.2.0", python = "==3.13"},  #{ version = ">=0.1.22", source = "testpypi" }
    {version = ">=0.2.0", python = "==3.14"}   #{ version = ">=0.1.22", source = "testpypi" }
]
scikit-learn = [
    {version = "<1.7", python = "==3.10"},
	{version = "<1.7", python = "==3.11"},
	{version = "<1.7", python = "==3.12"},
	{version = ">=1.5.2,<1.7", python = "==3.13"},
    # {version = ">=1.7.2,<1.7", python = "==3.14"}
	{version = "<1.7", python = "==3.14"}
]

[tool.poetry.group.dev.dependencies]
bokeh = "*"
docutils = ">=0.20"
graphviz = "*"
jupyter = "*"
notebook = "*"


[tool.poetry.group.test.dependencies]
pytest = [
    {version = ">=7.0.0", python = "==3.10"},
	{version = ">=7.0.0", python = "==3.11"},
	{version = ">=7.0.0", python = "==3.12"},
	{version = ">=7.0.0", python = "==3.13"},
    {version = ">=8.0.0", python = "==3.14"}
]
pytest-cov = "*"
pytest-html = "*"


[tool.poetry.extras]
# Optional dependencies. They can be opted into by apps.


[tool.poetry.scripts]


[tool.poetry.plugins]


[tool.poetry.urls]
Homepage = "https://github.com/PylarBear/pybear"


#[[tool.poetry.source]]
#name = "testpypi"
#url = "https://test.pypi.org/simple/"
#priority = "explicit"


[tool.coverage.run]
source = ["pybear_dask"]


[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"


