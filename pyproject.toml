[tool.poetry]
name = "pybear-dask"
version = "0.2.4"
description = "Python modules for data analytics applications with dask"
license = "BSD-3-clause"
authors = ["Bill Sousa <WKSJR99@msn.com>"]
maintainers = ["Bill Sousa"]
readme = "README.rst"
homepage = "https://github.com/PylarBear/pybear-dask"
repository = "https://github.com/PylarBear/pybear-dask"
#documentation
keywords = ["python data analytics pybear dask"]
#classifiers
packages = [
	{ include = "pybear_dask", from = "src"}
]
include = [
    "LICENSE",
    "README.rst",
    "CHANGELOG.md",
    "tests"
]
#exclude


[tool.poetry.dependencies]
python = ">=3.10"
dask = [
    {version = "==2024.11.1", python = "==3.10"},   # can be 2025.1, 2024.12.1, 2024.12.0, 2024.11.2 try 2024.11.1 then 2024.10.0
    {version = "==2024.11.1", python = "==3.11"},   # can be 2025.1, 2024.12.1, 2024.12.0, 2024.11.2 try 2024.11.1 then 2024.10.0
    {version = "==2024.11.1", python = "==3.12"},   # can be 2025.1, 2024.12.1, 2024.12.0, 2024.11.2 try 2024.11.1 then 2024.10.0
    {version = ">=2025.1, ==2025.4.0", python = "==3.13"},	# this must be >= 2025.1, 2025.2.0 2025.3.0 works
    {version = "==2026.3", python = "==3.14"},
]
dask-ml = [
    {version = "==2024.3.20", python = "==3.10"},  # can be 2025.1, 2024.4.4. 2024.3.20... 2023.3.24 did not work
    {version = "==2024.3.20", python = "==3.11"},  # can be 2025.1, 2024.4.4. 2024.3.20... 2023.3.24 did not work
    {version = "==2024.3.20", python = "==3.12"},  # can be 2025.1, 2024.4.4. 2024.3.20... 2023.3.24 did not work
    {version = "==2025.1", python = "==3.13"},  # this must == 2025.1
    {version = "==2025.1", python = "==3.14"},
]
distributed = [
    {version = "==2024.11.1", python = "==3.10"},  # can be 2025.1, 2024.12.1, 2024.12.0, 2024.11.2 try 2024.11.1 then 2024.10.0
    {version = "==2024.11.1", python = "==3.11"},  # can be 2025.1, 2024.12.1, 2024.12.0, 2024.11.2 try 2024.11.1 then 2024.10.0
    {version = "==2024.11.1", python = "==3.12"},  # can be 2025.1, 2024.12.1, 2024.12.0, 2024.11.2 try 2024.11.1 then 2024.10.0
    {version = ">=2025.1, ==2025.4.0", python = "==3.13"},	# this must be >= 2025.1, 2025.2.0 2025.3.0 works
    {version = "==2026.3", python = "==3.14"},  # if this fails, maybe try a lower version
]
numba = [
    {version = ">=0.63.0", python = "==3.14"},  # if this fails, maybe try a higher version
]
pyarrow = [
    {version = "==16.0.0", python = "==3.10"},  # done
	{version = "==16.0.0", python = "==3.11"},  # done
	{version = "==16.0.0", python = "==3.12"},  # done
	{version = "==18.0.0", python = "==3.13"},  # done
    {version = "==22.0.0", python = "==3.14"}   # done
]
#{ version = ">=0.1.22", source = "testpypi" }
pybear = [
    {version = "==0.2.4", python = "==3.10"},  # 0.2.3 works
	{version = "==0.2.4", python = "==3.11"},  # 0.2.3 works
	{version = "==0.2.4", python = "==3.12"},  # 0.2.3 works
	{version = "==0.2.4", python = "==3.13"},  # 0.2.3 works
    {version = "==0.2.4", python = "==3.14"} 
]
scikit-learn = [
    {version = ">=1.3.0,==1.5.1,<1.8", python = "==3.10"},    # can be 1.6.1, 1.6.0, 1.5.2, cannot be 1.7.0, if 1.5.1 passes try 1.5.0
	{version = ">=1.3.0,==1.5.1", python = "==3.11"},    # can be 1.6.1, 1.6.0, 1.5.2, cannot be 1.7.0, if 1.5.1 passes try 1.5.0
	{version = ">=1.3.1,==1.5.1", python = "==3.12"},    # can be 1.6.1, 1.6.0, 1.5.2, cannot be 1.7.0, if 1.5.1 passes try 1.5.0
	{version = ">=1.6.1,==1.6.1", python = "==3.13"},    # can be 1.6.1, 1.7.0, 1.7.1, 1.7.2, if 1.8.0 passes try 1.9.0..... 1.8.0 wants __sklearn_tags__
	{version = ">=1.7.2,==1.7.2", python = "==3.14"}
]

[tool.poetry.group.dev.dependencies]
bokeh = "*"
docutils = ">=0.20"
graphviz = "*"
jupyter = "*"
notebook = "*"


[tool.poetry.group.test.dependencies]
pytest = [
    {version = ">=7.0.0", python = "==3.10"},
	{version = ">=7.0.0", python = "==3.11"},
	{version = ">=7.0.0", python = "==3.12"},
	{version = ">=7.0.0", python = "==3.13"},
    {version = ">=8.0.0", python = "==3.14"}
]
pytest-cov = "*"
pytest-html = "*"


[tool.poetry.extras]
# Optional dependencies. They can be opted into by apps.


[tool.poetry.scripts]


[tool.poetry.plugins]


[tool.poetry.urls]
Homepage = "https://github.com/PylarBear/pybear"


#[[tool.poetry.source]]
#name = "testpypi"
#url = "https://test.pypi.org/simple/"
#priority = "explicit"


[tool.coverage.run]
source = ["pybear_dask"]


[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"


