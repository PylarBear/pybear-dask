[tox]
envlist = py310, py311, py312, py313, py314
isolated_build = True

[testenv]
deps = 
	pytest
	lightgbm
	xgboost
	scipy
	polars-lts-cpu
commands = 
	pytest

# Additional environment-specific configurations
[testenv:py310]
description = Test with Python 3.10
basepython = python3.10

[testenv:py311]
description = Test with Python 3.11
basepython = python3.11

[testenv:py312]
description = Test with Python 3.12
basepython = python3.12

[testenv:py313]
description = Test with Python 3.13
basepython = python3.13

[testenv:py314]
description = Test with Python 3.14
basepython = python3.14